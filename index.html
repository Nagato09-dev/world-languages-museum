<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Museu de Linguagens do Mundo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 50px;
            animation: fadeIn 0.8s ease-in;
        }

        header h1 {
            font-size: 3.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        header p {
            font-size: 1.3em;
            opacity: 0.95;
        }

        .search-container {
            margin-bottom: 40px;
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .search-container input {
            padding: 12px 20px;
            border: none;
            border-radius: 25px;
            width: 300px;
            font-size: 1em;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
        }

        .search-container input:focus {
            outline: none;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
            transform: scale(1.05);
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 40px;
            color: white;
            flex-wrap: wrap;
        }

        .stat {
            background: rgba(255, 255, 255, 0.1);
            padding: 20px 30px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .stat h3 {
            font-size: 2em;
            margin-bottom: 5px;
        }

        .stat p {
            opacity: 0.9;
        }

        .languages-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 50px;
        }

        .language-card {
            background: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .language-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .language-card h3 {
            font-size: 1.3em;
            margin-bottom: 8px;
            word-break: break-word;
        }

        .language-card p {
            font-size: 0.9em;
            opacity: 0.7;
            margin-bottom: 10px;
        }

        .language-card .badge {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8em;
            width: fit-content;
        }

        .language-card:hover .badge {
            background: rgba(255, 255, 255, 0.3);
        }

        .hidden {
            display: none;
        }

        .no-results {
            grid-column: 1 / -1;
            text-align: center;
            padding: 40px;
            color: white;
            font-size: 1.2em;
        }

        footer {
            text-align: center;
            color: white;
            padding: 30px;
            opacity: 0.8;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .language-card {
            animation: fadeIn 0.5s ease-in;
        }

        @media (max-width: 768px) {
            header h1 {
                font-size: 2em;
            }

            .search-container input {
                width: 100%;
            }

            .languages-grid {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            }

            .stats {
                flex-direction: column;
                gap: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🌍 Museu de Linguagens do Mundo</h1>
            <p>Explore 500 linguagens de programação com exemplos, exercícios e documentação</p>
        </header>

        <div class="stats">
            <div class="stat">
                <h3>500+</h3>
                <p>Linguagens</p>
            </div>
            <div class="stat">
                <h3>5.000</h3>
                <p>Exercícios</p>
            </div>
            <div class="stat">
                <h3>10.000</h3>
                <p>Arquivos</p>
            </div>
        </div>

        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Buscar linguagem (ex: Python, JavaScript, Rust)...">
        </div>

        <div class="languages-grid" id="languagesGrid">
            <!-- Será preenchido por JavaScript -->
        </div>

        <footer>
            <p>Desenvolvido com ❤️ | <a href="https://github.com/Nagato09-dev/museu-de-linguagens-do-mundo" style="color: white; text-decoration: underline;">Ver no GitHub</a></p>
        </footer>
    </div>

    <script>
        const languages = [
            // Lista será gerada dinamicamente

        // Função para carregar as linguagens do repositório
        async function loadLanguages() {
            try {
                const response = await fetch('https://api.github.com/repos/Nagato09-dev/museu-de-linguagens-do-mundo/contents/linguagens');
                const data = await response.json();
                
                data.forEach(item => {
                    if (item.type === 'dir') {
                        languages.push({
                            name: item.name,
                            path: item.html_url
                        });
                    }
                });

                renderLanguages(languages);
            } catch (error) {
                console.error('Erro ao carregar linguagens:', error);
                // Fallback: carregar lista pré-definida
                loadFallbackLanguages();
            }
        }

        function renderLanguages(languagesToRender) {
            const grid = document.getElementById('languagesGrid');
            grid.innerHTML = '';

            if (languagesToRender.length === 0) {
                grid.innerHTML = '<div class="no-results">Nenhuma linguagem encontrada. Tente outra busca!</div>';
                return;
            }

            languagesToRender.forEach(lang => {
                const card = document.createElement('a');
                card.href = lang.path;
                card.target = '_blank';
                card.className = 'language-card';
                card.innerHTML = `
                    <div>
                        <h3>${lang.name}</h3>
                        <p>Clique para explorar</p>
                    </div>
                    <span class="badge">Ver Detalhes →</span>
                `;
                grid.appendChild(card);
            });
        }

        // Busca em tempo real
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const searchTerm = e.target.value.toLowerCase();
            const filtered = languages.filter(lang => lang.name.toLowerCase().includes(searchTerm));
            renderLanguages(filtered);
        });

        // Carregar linguagens ao iniciar
        loadLanguages();
